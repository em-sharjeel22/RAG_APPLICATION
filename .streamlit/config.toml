[theme]
primaryColor = "#4f46e5"
backgroundColor = "#0f1117"
secondaryBackgroundColor = "#1a1d27"
textColor = "#e2e8f0"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "info"

[server]
headless = true
port = 8501
maxUploadSize = 200
enableXsrfProtection = true
